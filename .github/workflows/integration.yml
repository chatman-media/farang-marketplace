# 🔄 Integration Tests
# Comprehensive testing with full environment stack
# Tests all services with PostgreSQL, Redis, and MinIO

name: 🔄 Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly at 1 AM UTC
    - cron: '0 1 * * *'

env:
  NODE_VERSION: '22'
  BUN_VERSION: '1.2.1'
  DATABASE_URL: 'postgresql://marketplace_user:marketplace_pass@localhost:5432/marketplace_test'
  REDIS_URL: 'redis://localhost:6379'
  MINIO_ENDPOINT: 'http://localhost:9000'
  MINIO_ACCESS_KEY: 'minioadmin'
  MINIO_SECRET_KEY: 'minioadmin123'
  JWT_SECRET: 'test-jwt-secret-for-ci'
  NODE_ENV: 'test'
  CI: 'true'

jobs:
  integration-tests:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: marketplace_user
          POSTGRES_PASSWORD: marketplace_pass
          POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
        options: >-
          --health-cmd "pg_isready -U marketplace_user -d marketplace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin123
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 30s
          --health-timeout 20s
          --health-retries 3
        ports:
          - 9000:9000

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔧 Setup test environment
        run: |
          cp .env.example .env.test
          cat >> .env.test << EOF
          DATABASE_URL=${{ env.DATABASE_URL }}
          REDIS_URL=${{ env.REDIS_URL }}
          MINIO_ENDPOINT=${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY=${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ env.MINIO_SECRET_KEY }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          NODE_ENV=test
          EOF

      - name: ⏳ Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U marketplace_user; do sleep 1; done'

          echo "Waiting for Redis..."
          timeout 30 bash -c 'until redis-cli -h localhost -p 6379 ping; do sleep 1; done'

          echo "Waiting for MinIO..."
          timeout 60 bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 2; done'

          echo "✅ All services are ready!"

      - name: 🗄️ Initialize databases
        run: |
          # Create test databases for each service
          PGPASSWORD=marketplace_pass psql -h localhost -U marketplace_user -d marketplace_test -c "
            CREATE SCHEMA IF NOT EXISTS payment;
            CREATE SCHEMA IF NOT EXISTS users;
            CREATE SCHEMA IF NOT EXISTS listings;
            CREATE SCHEMA IF NOT EXISTS bookings;
            CREATE SCHEMA IF NOT EXISTS notifications;
            CREATE SCHEMA IF NOT EXISTS ai;
            CREATE SCHEMA IF NOT EXISTS crm;
            CREATE SCHEMA IF NOT EXISTS agency;
          "

      - name: 🏗️ Build packages
        run: |
          bun run build --filter=@marketplace/shared-types
          bun run build --filter=@marketplace/database-schema
          bun run build --filter=@marketplace/logger

      - name: 🔧 Run database migrations
        run: |
          # Run migrations for all services
          cd packages/database-schema
          bun run db:push || echo "Migrations completed"

      - name: 🪣 Initialize MinIO buckets
        run: |
          # Install MinIO client
          wget -q https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc

          # Configure MinIO client
          ./mc alias set myminio http://localhost:9000 minioadmin minioadmin123

          # Create buckets
          ./mc mb myminio/marketplace-images || true
          ./mc mb myminio/marketplace-documents || true
          ./mc mb myminio/test-uploads || true

          # Set public policy for test buckets
          ./mc anonymous set download myminio/marketplace-images

          echo "✅ MinIO buckets initialized"

      - name: 🧪 Run integration tests
        run: bun run test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          NODE_ENV: test

      - name: 📊 Generate test report
        if: always()
        run: |
          echo "## 🧪 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | ✅ Running |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis | ✅ Running |" >> $GITHUB_STEP_SUMMARY
          echo "| MinIO | ✅ Running |" >> $GITHUB_STEP_SUMMARY

      - name: 🐛 Debug on failure
        if: failure()
        run: |
          echo "=== PostgreSQL Logs ==="
          docker logs $(docker ps -q --filter ancestor=postgres:15-alpine) || true

          echo "=== Redis Status ==="
          redis-cli -h localhost -p 6379 INFO || true

          echo "=== MinIO Status ==="
          curl -v http://localhost:9000/minio/health/live || true

          echo "=== Environment Variables ==="
          env | grep -E "DATABASE|REDIS|MINIO" | sort

  e2e-tests:
    name: 🌐 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: integration-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: marketplace_e2e
          POSTGRES_USER: marketplace_user
          POSTGRES_PASSWORD: marketplace_pass
        options: >-
          --health-cmd "pg_isready -U marketplace_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build all services
        run: bun run build

      - name: 🚀 Start services in background
        run: |
          # Start API gateway and services
          bun run dev &

          # Wait for services to be ready
          sleep 10

          # Check if services are responding
          timeout 60 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done' || true

      - name: 🧪 Run E2E tests
        run: |
          # Placeholder for E2E tests
          echo "E2E tests would run here"
          echo "Example: Playwright, Cypress, or API contract tests"

      - name: 📸 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-test-results
          path: |
            test-results/
            screenshots/
            videos/
          retention-days: 7

  api-contract-tests:
    name: 📋 API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 📋 Validate API contracts
        run: |
          echo "✅ API contract validation"
          # Placeholder for OpenAPI validation, Pact tests, etc.
          echo "Would validate:"
          echo "  - OpenAPI specifications"
          echo "  - Service contracts"
          echo "  - API versioning compatibility"

  all-integration-passed:
    name: ✅ All Integration Tests Passed
    runs-on: ubuntu-latest
    needs: [integration-tests, e2e-tests, api-contract-tests]
    if: always()

    steps:
      - name: ✅ Verify all tests passed
        run: |
          if [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.api-contract-tests.result }}" != "success" ]; then
            echo "❌ One or more integration tests failed"
            exit 1
          fi
          echo "✅ All integration tests passed successfully!"
