name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan: catches vulnerabilities flagged by NEW CodeQL rules
    # even when the code hasn't changed (the PR trigger only sees the delta).
    - cron: "27 4 * * 1"

# Cancel duplicate PR scans on the same ref; never cancel on main.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      security-events: write # upload SARIF results to the Security tab
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # JS+TS are analysed by one extractor. build-mode none — CodeQL reads
          # the sources directly, no build (bun) is required.
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended = default + the extended set of security queries
          # (more coverage, sometimes more noise — drop if it gets noisy).
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
