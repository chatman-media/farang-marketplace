# 🚀 Main CI Pipeline for Thailand Marketplace
# Fast checks on every push and PR
# Runs lint, type-check, tests, and build with full environment

name: 🚀 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  BUN_VERSION: "1.2.1"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
  REDIS_URL: "redis://localhost:6379"
  NODE_ENV: "test"
  CI: "true"

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Run linter
        run: bun run lint

      - name: 📝 Check formatting
        run: bun run format:check

      - name: 📦 Check imports organization
        run: bun run organize-imports:check

  type-check:
    name: 🔎 Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build shared packages
        run: bun run build --filter=@marketplace/shared-types --filter=@marketplace/database-schema --filter=@marketplace/logger

      - name: 🔎 Run type check
        run: bun run type-check

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install PostgreSQL and Redis client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔧 Setup test environment
        run: |
          cp .env.example .env.test
          cat >> .env.test << EOF
          DATABASE_URL=${{ env.DATABASE_URL }}
          REDIS_URL=${{ env.REDIS_URL }}
          JWT_SECRET=test-jwt-secret-for-ci
          NODE_ENV=test
          LOG_LEVEL=error
          EOF

      - name: ⏳ Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done'

          echo "Waiting for Redis..."
          timeout 30 bash -c 'until redis-cli -h localhost -p 6379 ping; do sleep 1; done'

          echo "✅ All services are ready!"

      - name: 🗄️ Initialize test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -c "
            CREATE SCHEMA IF NOT EXISTS payment;
            CREATE SCHEMA IF NOT EXISTS users;
            CREATE SCHEMA IF NOT EXISTS listings;
            CREATE SCHEMA IF NOT EXISTS bookings;
          "

      - name: 🏗️ Build shared packages
        run: |
          bun run build --filter=@marketplace/shared-types
          bun run build --filter=@marketplace/database-schema
          bun run build --filter=@marketplace/logger

      - name: 🏗️ Build remaining packages
        run: bun run build

      - name: 🗄️ Setup database schema
        run: |
          cd packages/database-schema
          # Push schema, ignore if it already exists
          bun run db:push 2>&1 || true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: 🧪 Run unit tests
        run: bun run test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: test
          CI: true

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/coverage/
            **/test-results/
          retention-days: 7

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build all packages
        run: bun run build
        env:
          NODE_ENV: production

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/dist/
            **/build/
            !**/node_modules/
          retention-days: 7

  all-checks-passed:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build]
    if: always()

    steps:
      - name: 📊 Generate CI summary
        run: |
          echo "## 🚀 CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "| 🔍 Lint & Format | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Lint & Format | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.type-check.result }}" == "success" ]; then
            echo "| 🔎 Type Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔎 Type Check | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "| 🧪 Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "| 🏗️ Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🏗️ Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: ✅ Verify all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed successfully!"
