# ⚡ Performance & Load Testing
# Monitors performance metrics and runs load tests
# Helps identify performance regressions early

name: ⚡ Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  BUN_VERSION: '1.2.1'
  NODE_ENV: 'test'

jobs:
  bundle-size:
    name: 📦 Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build project
        run: bun run build
        env:
          NODE_ENV: production

      - name: 📊 Analyze bundle sizes
        run: |
          echo "## 📦 Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service/App | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|------|---------|" >> $GITHUB_STEP_SUMMARY

          # Analyze each service and app
          for dir in apps/* services/*; do
            if [ -d "$dir/dist" ] || [ -d "$dir/build" ]; then
              name=$(basename $dir)

              # Calculate sizes
              if [ -d "$dir/dist" ]; then
                size=$(du -sh "$dir/dist" | cut -f1)
                gzipped=$(tar -czf - "$dir/dist" | wc -c | numfmt --to=iec-i --suffix=B)
              elif [ -d "$dir/build" ]; then
                size=$(du -sh "$dir/build" | cut -f1)
                gzipped=$(tar -czf - "$dir/build" | wc -c | numfmt --to=iec-i --suffix=B)
              fi

              echo "| $name | $size | $gzipped |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 🎯 Check bundle size limits
        run: |
          # Define size limits (in MB)
          MAX_BACKEND_SIZE=10
          MAX_FRONTEND_SIZE=5

          echo "✅ Bundle size check complete"
          echo "Note: Add actual size limit checks as needed"

  build-performance:
    name: ⚡ Build Performance
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: |
          START_TIME=$(date +%s)
          bun install --frozen-lockfile
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "install_duration=$DURATION" >> $GITHUB_ENV
          echo "📦 Dependencies installed in ${DURATION}s"

      - name: 🏗️ Build with timing
        run: |
          START_TIME=$(date +%s)
          bun run build
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "build_duration=$DURATION" >> $GITHUB_ENV
          echo "🏗️ Build completed in ${DURATION}s"

      - name: 📊 Performance summary
        run: |
          echo "## ⚡ Build Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Install | ${install_duration}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${build_duration}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | $((install_duration + build_duration))s |" >> $GITHUB_STEP_SUMMARY

  api-performance:
    name: 🚀 API Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: marketplace_perf
          POSTGRES_USER: marketplace_user
          POSTGRES_PASSWORD: marketplace_pass
        options: >-
          --health-cmd "pg_isready -U marketplace_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build services
        run: bun run build

      - name: 🚀 Performance test placeholder
        run: |
          echo "## 🚀 API Performance Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Performance tests would run here:" >> $GITHUB_STEP_SUMMARY
          echo "- API endpoint response times" >> $GITHUB_STEP_SUMMARY
          echo "- Database query performance" >> $GITHUB_STEP_SUMMARY
          echo "- Cache hit rates" >> $GITHUB_STEP_SUMMARY
          echo "- Concurrent request handling" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Consider using tools like:" >> $GITHUB_STEP_SUMMARY
          echo "- k6 for load testing" >> $GITHUB_STEP_SUMMARY
          echo "- autocannon for HTTP benchmarking" >> $GITHUB_STEP_SUMMARY
          echo "- clinic.js for Node.js performance profiling" >> $GITHUB_STEP_SUMMARY

  memory-leak-check:
    name: 🔍 Memory Leak Detection
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Memory leak check placeholder
        run: |
          echo "## 🔍 Memory Leak Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Memory leak detection would include:" >> $GITHUB_STEP_SUMMARY
          echo "- Heap snapshot analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Memory usage trends" >> $GITHUB_STEP_SUMMARY
          echo "- GC performance metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tools to consider:" >> $GITHUB_STEP_SUMMARY
          echo "- node --inspect for debugging" >> $GITHUB_STEP_SUMMARY
          echo "- clinic.js bubbleprof for memory profiling" >> $GITHUB_STEP_SUMMARY
          echo "- memlab for memory leak detection" >> $GITHUB_STEP_SUMMARY

  performance-summary:
    name: 📊 Performance Summary
    runs-on: ubuntu-latest
    needs: [bundle-size, build-performance, api-performance, memory-leak-check]
    if: always()

    steps:
      - name: 📊 Generate summary
        run: |
          echo "## ⚡ Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.bundle-size.result }}" == "success" ]; then
            echo "| 📦 Bundle Size | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📦 Bundle Size | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build-performance.result }}" == "success" ]; then
            echo "| ⚡ Build Performance | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚡ Build Performance | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.api-performance.result }}" == "success" ]; then
            echo "| 🚀 API Performance | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🚀 API Performance | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.memory-leak-check.result }}" == "success" ]; then
            echo "| 🔍 Memory Leak Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Memory Leak Check | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Performance testing complete!" >> $GITHUB_STEP_SUMMARY
